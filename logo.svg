<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Dégradé de fond sombre -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dégradé pour le symbole de code -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond carré avec biseaux arrrondis -->
  <rect width="400" height="400" rx="50" fill="url(#bgGrad)"/>
  
  <!-- Icône de terminal / code < / > -->
  <g transform="translate(100, 60)">
    <rect width="200" height="150" rx="20" fill="url(#accentGrad)" opacity="0.15"/>
    <rect width="200" height="150" rx="20" stroke="url(#accentGrad)" stroke-width="5" fill="none"/>
    
    <!-- Crochet gauche < -->
    <path d="M 60 45 L 30 75 L 60 105" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Crochet droit > -->
    <path d="M 140 45 L 170 75 L 140 105" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- Slash / -->
    <path d="M 115 40 L 85 110" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Texte du logo -->
  <text x="200" y="275" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="38" fill="#ffffff" text-anchor="middle" letter-spacing="2">COURS</text>
  <text x="200" y="325" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="28" fill="#38bdf8" text-anchor="middle" letter-spacing="6">INFOS</text>
</svg>

