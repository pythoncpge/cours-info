<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interactive - Cour 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .counter {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #34495e;
            min-height: 50px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-option {
            background-color: #eef2f7;
            border: 2px solid #cbd5e1;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-option:hover {
            background-color: #e2e8f0;
        }

        .btn-next {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* كيختفي حتى يجاوب المستخدم */
        }

        .btn-next:hover {
            background-color: #2980b9;
        }

        .result {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <h2>Quiz : Cour 1</h2>
    <div class="counter" id="counter">Question 1 / 3</div>
    
    <div class="question" id="question-text"></div>

    <div class="options" id="options-container"></div>

    <div class="result" id="result-message"></div>

    <button class="btn-next" id="next-btn" onclick="nextQuestion()">السؤال التالي ➔</button>
</div>

<script>
    // 1. قائمة الأسئلة (تقدر تزيد شحال ما بغيتي ديال الأسئلة هنا)
    const questions = [
        {
            question: "En Python, quelle est la fonction utilisée pour afficher du texte ?",
            options: ["input()", "print()", "output()", "display()"],
            answer: 1 // الترتيب ديال الجواب الصحيح (يبدأ من 0)
        },
        {
            question: "Quel symbole est utilisé pour les commentaires sur une seule ligne en Python ?",
            options: ["//", "/*", "#", "--"],
            answer: 2
        },
        {
            question: "Quelle est la valeur de le type de la variable x = 5.5 ?",
            options: ["int", "string", "bool", "float"],
            answer: 3
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    // 2. دالة عرض السؤال الحالي
    function showQuestion() {
        resetState();
        let currentQuestion = questions[currentQuestionIndex];
        
        document.getElementById("counter").innerText = `Question ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById("question-text").innerText = currentQuestion.question;

        let optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        currentQuestion.options.forEach((option, index) => {
            let button = document.createElement("button");
            button.innerText = option;
            button.classList.add("btn-option");
            button.onclick = () => selectAnswer(button, index);
            optionsContainer.appendChild(button);
        });
    }

    // 3. تنظيف الحالة قبل السؤال التالي
    function resetState() {
        document.getElementById("result-message").innerText = "";
        document.getElementById("next-btn").style.display = "none";
    }

    // 4. التحقق من الإجابة
    function selectAnswer(selectedButton, selectedIndex) {
        let currentQuestion = questions[currentQuestionIndex];
        let buttons = document.querySelectorAll(".btn-option");
        let resultDiv = document.getElementById("result-message");

        // حبس باقي الأزرار
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuestion.answer) {
            selectedButton.style.backgroundColor = "#27ae60";
            selectedButton.style.color = "white";
            resultDiv.className = "result correct";
            resultDiv.innerText = "صحيح ! Bravo ✅";
            score++;
        } else {
            selectedButton.style.backgroundColor = "#e74c3c";
            selectedButton.style.color = "white";
            buttons[currentQuestion.answer].style.backgroundColor = "#27ae60"; // إظهار الجواب الصحيح
            buttons[currentQuestion.answer].style.color = "white";
            resultDiv.className = "result incorrect";
            resultDiv.innerText = "خطأ ! ❌";
        }

        // إظهار زر الانتقال للسؤال التالي
        document.getElementById("next-btn").style.display = "inline-block";
    }

    // 5. الانتقال للسؤال التالي أو إنهاء الـ Quiz
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showFinalScore();
        }
    }

    // 6. عرض النتيجة النهائية
    function showFinalScore() {
        let quizBox = document.getElementById("quiz-box");
        quizBox.innerHTML = `
            <h2>النهاية ! 🎯</h2>
            <p style="font-size: 20px;">النتيجة ديالك هي: <strong>${score} / ${questions.length}</strong></p>
            <button class="btn-option" style="background-color: #3498db; color: white;" onclick="location.reload()">إعادة الـ Quiz 🔄</button>
        `;
    }

    // بداية التشغيل
    showQuestion();
</script>

</body>
</html>
