<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Chapitre 3 - Python CPGE</title>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
        :root {
            --primary-color: #1b4965;
            --accent-color: #0077b6;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            padding: 30px 15px;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .btn-back {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .btn-back:hover { transform: translateX(-4px); }

        .interactive-box {
            background: #0f172a;
            color: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .interactive-box textarea {
            width: 100%;
            height: 120px;
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            box-sizing: border-box;
            resize: vertical;
        }

        .btn-run {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }

        .btn-run:hover { background: #1d4ed8; }

        .result-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            display: none;
        }
        .status-success { background: #166534; color: #dcfce7; }
        .status-error { background: #991b1b; color: #fee2e2; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" id="backLink" class="btn-back">← Retour à l'accueil</a>

        <h2>🧪 Application Pratique : Chapitre 3</h2>

        <div class="interactive-box">
            <p style="margin-top:0; color: #cbd5e1;">
                <b>Consigne :</b> Utilisez une boucle <span style="color:#38bdf8">for</span> et <span style="color:#38bdf8">range()</span> pour calculer et afficher la somme des entiers de 1 à 5 inclus (1+2+3+4+5).<br>
                <i>(Résultat attendu : <b>15</b>)</i>
            </p>

            <textarea id="userCode" placeholder="# Écrivez votre code Python ici..."></textarea>

            <button class="btn-run" onclick="runPythonCode()">Exécuter & Vérifier 🚀</button>

            <div id="outputSuccess" class="result-box status-success"></div>
            <div id="outputError" class="result-box status-error"></div>
        </div>
    </div>

    <script>
        let pyodideInstance = null;

        async function initPyodide() {
            if (!pyodideInstance) {
                pyodideInstance = await loadPyodide();
            }
        }
        initPyodide();

        async function runPythonCode() {
            const successBox = document.getElementById("outputSuccess");
            const errorBox = document.getElementById("outputError");
            
            successBox.style.display = "none";
            errorBox.style.display = "none";

            const code = document.getElementById("userCode").value.trim();

            if (code === "" || code === "# Écrivez votre code Python ici...") {
                alert("Veuillez d'abord écrire votre code Python !");
                return;
            }

            if (!pyodideInstance) {
                alert("Le moteur Python charge encore...");
                return;
            }

            const expectedOutput = "15";

            try {
                pyodideInstance.runPython(`
                    import sys, io
                    sys.stdout = io.StringIO()
                `);

                await pyodideInstance.runPythonAsync(code);
                let output = pyodideInstance.runPython("sys.stdout.getvalue()").trim();

                if (output === expectedOutput) {
                    successBox.innerHTML = "✅ Excellent ! Boucle validée. Résultat : <b>" + output + "</b>";
                    successBox.style.display = "block";
                    localStorage.setItem('cour3_completed', 'true');
                } else {
                    errorBox.innerHTML = "❌ Résultat incorrect ! Affiché : <b>" + (output || "Rien") + "</b> (Attendu : <b>" + expectedOutput + "</b>)";
                    errorBox.style.display = "block";
                }
            } catch (err) {
                errorBox.innerHTML = "⚠️ Erreur dans votre code Python :<br><small>" + err.message.split('\n').pop() + "</small>";
                errorBox.style.display = "block";
            }
        }

        const directLink = "https://omg10.com/4/11367859";
        document.getElementById('backLink').addEventListener('click', function(e) {
            e.preventDefault();
            window.open(directLink, '_blank');
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
