<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python CPGE - Accueil</title>
    <style>
        :root {
            --primary-color: #1b4965;
            --accent-color: #1abc9c;
            --accent-hover: #16a085;
            --secondary-color: #3498db;
            --secondary-hover: #2980b9;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        p.description {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 30px;
        }

        /* Conteneur pour regrouper et aligner les deux boutons */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px; /* Espace entre les deux boutons */
            flex-wrap: wrap; /* Aligne verticalement sur petit écran */
            margin-top: 25px;
        }

        /* Style de base des boutons */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Style du Premier Bouton (Cours 1) */
        .btn-primary {
            background-color: var(--accent-color);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* Style du Deuxième Bouton (Cours 2) */
        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Plateforme Python CPGE</h1>
        <p class="description">Accédez aux supports de cours d'informatique pour la première année aux classes préparatoires(MPSI;PCSI) </p>

        <!-- Les deux boutons regroupés dans une div -->
        <div class="buttons-container">
            <a href="cour1.html" class="btn btn-primary">Voir le Cour 1</a>
            <a href="cour2.html" class="btn btn-secondary">Voir le Cour 2</a>
        </div>
    </div>

</body>
</html>
