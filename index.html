<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours de Python - CPGE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .welcome-msg {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
            border-left: 4px solid #1abc9c;
            padding-left: 15px;
        }

        .slide-section {
            background-color: #f9f9f9;
            border: 1px solid #eef2f3;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .slide-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .btn-download {
            display: inline-block;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }

        .btn-download:hover {
            background-color: #c0392b;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Cours d'Informatique : Python</h1>
    </header>

    <div class="container">
        <div class="welcome-msg">
            <p>Bienvenue sur votre espace de cours. Vous trouverez ci-dessous le premier chapitre ainsi que les slides officielles du cours 1 pour bien démarrer votre programme.</p>
        </div>

        <div class="slide-section">
            <div class="slide-title">📥 Cour 1 : Notion de base en python </div>
           <a href="cour1.html" class="btn-download">Lire le Cour 1</a>
        </div>
    </div>

    <footer>
        &copy; 2026 - Tous droits réservés.
    </footer>

</body>
</html>
